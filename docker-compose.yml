services:
  db:
    image: postgres:16-alpine
    container_name: zero_auth_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zero_auth_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zero_auth_app
    command: sh -c "if [ -f mix.exs ]; then mix phx.server; else sh; fi"
    volumes:
      - .:/app
      - mix_deps:/app/deps
      - mix_build:/app/_build
    ports:
      - "4000:4000"
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_NAME: zero_auth_dev
      PHX_HOST: localhost
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-$(mix phx.gen.secret)}
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  mix_deps:
  mix_build:
